<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calendar Events</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: "Segoe UI", sans-serif;
    background: transparent;
    padding:20px;
}

.calendar-container{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:16px;
    width:100%;
}

.card{
    height:320px;
    perspective:1200px;
    cursor:pointer;
}

.card-inner{
    position:relative;
    width:100%;
    height:100%;
    transition:transform 0.8s ease;
    transform-style:preserve-3d;
}

.card.flipped .card-inner{
    transform:rotateY(180deg);
}

.front,
.back{
    position:absolute;
    width:100%;
    height:100%;
    backface-visibility:hidden;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 4px 18px rgba(0,0,0,.15);
}

.front{
    background:#fff;
}

.front img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.back{
    background:white;
    transform:rotateY(180deg);

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:20px;
    text-align:center;
}

.back h3{
    margin-bottom:12px;
    color:#003366;
    font-size:20px;
}

.back p{
    color:#666;
    line-height:1.5;
}

.back small{
    margin-top:15px;
    color:#999;
}

@media (max-width:1400px){

    .calendar-container{
        grid-template-columns:repeat(3,1fr);
    }

}

@media (max-width:768px){

    .calendar-container{
        grid-template-columns:repeat(2,1fr);
    }

}

</style>
</head>

<body>

<div class="calendar-container">

    <!-- CARD 1 -->
    <div class="card">
        <div class="card-inner">
            <div class="front">
                <img src="https://drive.google.com/uc?export=view&id=1l8_vTGOd1dPbSnXmA_Yy-0KznBkC_MRY">
            </div>

            <div class="back">
                <h3>Event Title</h3>
                <p>
                    Event description goes here.
                </p>
                <small>Click again to flip back</small>
            </div>
        </div>
    </div>

    <!-- CARD 2 -->
    <div class="card">
        <div class="card-inner">
            <div class="front">
                <img src="https://drive.google.com/uc?export=view&id=1GttwJjXNV6K4hWIsuEZf0hOnUKk-pOJE">
            </div>

            <div class="back">
                <h3>Event Title</h3>
                <p></p>
            </div>
        </div>
    </div>

    <!-- CARD 3 -->
    <div class="card">
        <div class="card-inner">
            <div class="front">
                <img src="https://drive.google.com/uc?export=view&id=1u-Jh4DBSabUxofNDSOKTbZ2B_rv0oS0p">
            </div>

            <div class="back">
                <h3>Event Title</h3>
                <p></p>
            </div>
        </div>
    </div>

    <!-- CARD 4 -->
    <div class="card">
        <div class="card-inner">
            <div class="front">
                <img src="https://drive.google.com/uc?export=view&id=1R_SsluY1kDLTlnFeoZIm40PMcitueJ27">
            </div>

            <div class="back">
                <h3>Event Title</h3>
                <p></p>
            </div>
        </div>
    </div>

    <!-- CARD 5 -->
    <div class="card">
        <div class="card-inner">
            <div class="front">
                <img src="https://drive.google.com/uc?export=view&id=1kd85bi5voMoRYNSoGD_h90ZPuQ2F-jlm">
            </div>

            <div class="back">
                <h3>Event Title</h3>
                <p></p>
            </div>
        </div>
    </div>

    <!-- CARD 6 -->
    <div class="card">
        <div class="card-inner">
            <div class="front">
                <img src="https://drive.google.com/uc?export=view&id=1qsBtbvq6Ak7quYZfKlrVVM9bBSe2O5vf">
            </div>

            <div class="back">
                <h3>Event Title</h3>
                <p></p>
            </div>
        </div>
    </div>

</div>

<script>

document.querySelectorAll(".card").forEach(card => {

    card.addEventListener("click", () => {

        card.classList.toggle("flipped");

    });

});

</script>

</body>
</html>
