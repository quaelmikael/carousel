<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calendar Events</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:transparent;
    padding:10px;
}

/* ===== DESKTOP ===== */

.calendar-container{
    display:grid;
    grid-template-columns:repeat(6, minmax(0,1fr));
    gap:10px;
    width:100%;
}

.card{
    width:100%;
    aspect-ratio:3/4;
    perspective:1200px;
    cursor:pointer;
}

.card-inner{
    position:relative;
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    transition:transform .8s ease;
}

.card.flipped .card-inner{
    transform:rotateY(180deg);
}

.front,
.back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:14px;
    overflow:hidden;
    backface-visibility:hidden;
    box-shadow:0 4px 15px rgba(0,0,0,.15);
}

.front img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.back{
    background:white;
    transform:rotateY(180deg);

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-align:center;
    padding:15px;
}

.back h3{
    color:#003366;
    margin-bottom:10px;
}

.back p{
    color:#666;
    line-height:1.5;
}

/* ===== TABLET ===== */

@media (max-width:1024px){

    .calendar-container{
        grid-template-columns:repeat(3,1fr);
    }

}

/* ===== PHONE ===== */

@media (max-width:768px){

    .calendar-container{
        grid-template-columns:repeat(2,1fr);
    }

}

</style>
</head>

<body>
